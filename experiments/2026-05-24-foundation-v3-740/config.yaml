# Config for foundation-v3-740.
#
# Forked from foundation-component-isolation-740/config.yaml. Key differences:
#
# 1. Source dirs point at the EXTENDED parquets (built by
#    build_features_extended.py + build_rich_cols_extended.py over the
#    Aug 2025 -> Feb 2026 cross-patch training window). The legacy 7.40-only
#    parquets at player_features_prepatch_clean/ stay intact for back-compat.
# 2. Single ablation: `foundation_v3`. UW-SO is locked off in train.py.
# 3. Duration head is regression (SmoothL1 on log(seconds+1)) -- changed in
#    models.py + train.py. duration_bucket section retained for the post-hoc
#    bucket-top1-acc diagnostic.
# 4. PMAE EMA-teacher kept on; (team, team) attention bias on; patch token on.
# 5. Hand-tuned alpha weights (multitask-740 anchors): 1.0/0.15/0.3/0.1.
#
# HCE-strict: data.py refuses to walk test-window dates [2026-03-10, 2026-03-23].

snapshot_id: "7.40-2025-12-16"
snapshot_path: "data/snapshots/7.40-2025-12-16"
splits_spec: "splits.yaml"

seed: 42

anonymous_account_ids: [0, 4294967295]

# EXTENDED player_features parquet (built by build_features_extended.py).
player_features_transformer:
  source_dir: "data/snapshots/7.40-2025-12-16/processed/player_features_extended"
  feat_names:
    - "n_games_log1p"
    - "smoothed_winrate"
    - "smoothed_winrate_hero"
    - "last10_winrate"
    - "days_since_last_log1p"
    - "n_games_hero_log1p"
    - "hero_diversity_log1p"
    - "is_anonymous"
  n_player_feats: 8

# EXTENDED rich_cols sidecar (built by build_rich_cols_extended.py).
rich_cols:
  out_dir: "data/snapshots/7.40-2025-12-16/processed/rich_cols_extended"
  train_filename: "train.parquet"
  val_filename: "val.parquet"
  smoke_train_filename: "train_smoke.parquet"
  smoke_val_filename: "val_smoke.parquet"
  raw_roots:
    - "data/history/turbo"
    - "data/snapshots/7.40-2025-12-16/raw/turbo"
  feat_bounds:
    duration:        [0, 7200]
    kills:           [0, 100]
    deaths:          [0, 100]
    assists:         [0, 100]
    gpm:             [0, 5000]
    xpm:             [0, 5000]
    hero_damage:     [0, 500000]
    net_worth:       [0, 500000]

# Reuse multitask-740's item_vocab.json + duration bucket edges (unchanged).
item_vocab:
  vocab_path: "../2026-05-20-rich-supervision-multitask-740/results/item_vocab.json"

duration_bucket:
  n_buckets: 8
  # Edges are baked into item_vocab.json (vocab_blob["duration_bucket_edges"]).

# Train subsetting (5M-row stratified sub-sample to match prior anchors).
train_subset_size: 5000000
train_subset_stratify_on: "radiant_win"

hero:
  id_min: 1
  id_max: 150
  vocab_size: 151

# 5M-scale FT-Transformer (same skeleton as v2 / foundation-mvp).
transformer_model:
  embed_dim: 256
  d_model: 256
  n_heads: 8
  n_layers: 6
  ff_mult: 4
  dropout: 0.0
  # Foundation-specific architecture knobs.
  use_team_team_bias: true
  use_patch_token: true
  use_lobby_token: false
  use_canonical_sort: true
  decoder_n_layers: 2
  decoder_n_heads: 8
  remove_first_layer_first_ln: true

# Patch vocabulary. Larger than v2 because the extended corpus spans
# multiple patches. data.py:_patch_id_from_dates derives IDs from
# start_time_date.
patch:
  vocab_size: 8
  default_patch_id: 1

# PMAE EMA-teacher (proven safe in v2 iso_pmae).
pmae:
  enabled: true
  a: 0.05
  b: 0.5
  alpha_mae_start: 1.0
  alpha_mae_end: 0.1
  groups: ["player_block", "item_list", "hero_token", "patch_token"]
  min_rate: 0.05
  max_rate: 0.85
  ema_momentum: 0.996

transformer_optim:
  batch_size: 512
  lr: 1.0e-3
  weight_decay: 0.0
  max_epochs: 30
  warmup_steps: 1000
  cosine_min_lr: 1.0e-5
  num_workers: 0
  pin_memory: false
  mixed_precision: true
  patience: 5
  early_stopping_metric: val_win_log_loss

# Hand-tuned alpha weights (multitask-740 anchor values). NO UW-SO in v3.
multitask_loss:
  alpha_win: 1.0
  alpha_dur: 0.15
  alpha_item: 0.3
  alpha_kda: 0.1
  alpha_gpm: 0.1
  alpha_hd: 0.1
  aux_targets:
    - kills
    - gpm
    - hero_damage

# Single primary ablation. No sanity replication (iso_pmae + iso_teambias are
# anchors from v2 already). Saves wall.
transformer_ablations:
  - name: foundation_v3
    use_features: true
    multitask: true
    use_patch_token: true
    use_team_team_bias: true
    use_pmae: true
    use_uw_so: false   # locked off in train.py
    description: "PRIMARY. Canonical sort + team-team bias + PMAE EMA-teacher + patch token + extended cross-patch data + duration regression + hand-tuned alphas."

transformer_smoke:
  max_epochs: 1
  n_train: 50000
  n_val: 5000
  metrics_suffix: "_smoke"

# Comparison anchors.
anchors:
  plateau_baseline_740_val_auc: 0.6161
  transformer_plus_features_extended_740_val_auc: 0.6477298
  upstream_data_cleanup_740_clean_val_auc: 0.6477054
  rich_supervision_multitask_740_val_auc: 0.6495
  iso_pmae_val_auc: 0.6464
  iso_teambias_val_auc: 0.6493
  baseline_multitask_repro_anchor: 0.6470
  proposal_target_val_auc: 0.6508
  cleanup_anchor_val_auc: 0.6477054

output:
  results_dir: "results"
  metrics: "metrics.json"
