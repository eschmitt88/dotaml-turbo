# Config for v3-ablations-740.
#
# Forked from experiments/2026-05-24-foundation-v3-740/config.yaml.
# Two ablations:
#   - v3_dur_ce      : revert duration head to 8-bucket CE; everything else
#                      identical to v3.
#   - v3_player_emb  : add per-player identity embedding (~4M params at 128
#                      dim) on top of v3; duration stays as regression.
#
# Reuses the existing EXTENDED player_features + rich_cols sidecar parquets.
# Reuses the existing prior 7.40-only account_id sidecar (val_only coverage
# is 100%; train coverage is ~40% and the extended chunk is built by
# build_account_sidecar_extended.py for the missing pre-patch dates).
#
# HCE-strict: data.py refuses to walk test-window dates [2026-03-10, 2026-03-23].

snapshot_id: "7.40-2025-12-16"
snapshot_path: "data/snapshots/7.40-2025-12-16"
splits_spec: "splits.yaml"

seed: 42

anonymous_account_ids: [0, 4294967295]

player_features_transformer:
  source_dir: "data/snapshots/7.40-2025-12-16/processed/player_features_extended"
  feat_names:
    - "n_games_log1p"
    - "smoothed_winrate"
    - "smoothed_winrate_hero"
    - "last10_winrate"
    - "days_since_last_log1p"
    - "n_games_hero_log1p"
    - "hero_diversity_log1p"
    - "is_anonymous"
  n_player_feats: 8

rich_cols:
  out_dir: "data/snapshots/7.40-2025-12-16/processed/rich_cols_extended"
  train_filename: "train.parquet"
  val_filename: "val.parquet"
  smoke_train_filename: "train_smoke.parquet"
  smoke_val_filename: "val_smoke.parquet"
  raw_roots:
    - "data/history/turbo"
    - "data/snapshots/7.40-2025-12-16/raw/turbo"
  feat_bounds:
    duration:        [0, 7200]
    kills:           [0, 100]
    deaths:          [0, 100]
    assists:         [0, 100]
    gpm:             [0, 5000]
    xpm:             [0, 5000]
    hero_damage:     [0, 500000]
    net_worth:       [0, 500000]

# Account_id sidecar plumbing for A2. Three sources will be tried in order:
#   1. extended-chunk (built by this experiment; covers ~19M pre-patch rows)
#   2. prior 7.40-only train sidecar (covers ~13M in-patch rows)
#   3. prior 7.40-only val sidecar (covers 100% of extended val rows)
# Unmatched rows route to anonymous=0.
account_sidecar:
  raw_roots:
    - "data/history/turbo"
    - "data/snapshots/7.40-2025-12-16/raw/turbo"
  prior_sidecar_train_path:
    "experiments/2026-05-19-player-embedding-prelim-740/sidecar/account_ids_train.parquet"
  prior_sidecar_val_path:
    "experiments/2026-05-19-player-embedding-prelim-740/sidecar/account_ids_val.parquet"
  extended_train_out:
    "experiments/2026-05-25-v3-ablations-740/sidecar/account_ids_train_extended.parquet"
  smoke_extended_train_out:
    "experiments/2026-05-25-v3-ablations-740/sidecar/account_ids_train_extended_smoke.parquet"
  # List of paths to merge into the training data's account_id lookup.
  # Order is arbitrary; _load_account_sidecar does last-write-wins on overlap.
  train_paths:
    - "experiments/2026-05-25-v3-ablations-740/sidecar/account_ids_train_extended.parquet"
    - "experiments/2026-05-19-player-embedding-prelim-740/sidecar/account_ids_train.parquet"
  val_paths:
    - "experiments/2026-05-19-player-embedding-prelim-740/sidecar/account_ids_val.parquet"
  smoke_train_paths:
    # Smoke uses the prior train sidecar (covers ~49% of extended train_smoke);
    # missing rows route to anonymous. Plumbing test only.
    - "experiments/2026-05-19-player-embedding-prelim-740/sidecar/account_ids_train.parquet"
  smoke_val_paths:
    - "experiments/2026-05-19-player-embedding-prelim-740/sidecar/account_ids_val.parquet"

# Player embedding configuration for A2.
player_embedding:
  enabled: true
  # Top-K most-frequent non-anon accounts get individual embedding rows.
  vocab_top_n: 30000
  # Hash region for long-tail non-anon accounts (account_id % B + hash_base_idx).
  n_hash_buckets: 1024
  # Layout invariants (consistent with build_vocab.py output):
  #   0           = shared anonymous embedding
  #   1..K        = individual top-K frequent
  #   K+1..K+B    = hash buckets (rare players)
  # hash_base_idx is derived from the actual vocab JSON's meta on load
  # (computed by build_vocab.py = 1 + n_top_kept). Setting here is a
  # default sentinel; train.py reads from meta.
  hash_base_idx: 30001
  embed_dim: 128
  init_std: 0.02
  vocab_path: "vocab/player_id_vocab.json"

item_vocab:
  vocab_path: "../2026-05-20-rich-supervision-multitask-740/results/item_vocab.json"

duration_bucket:
  n_buckets: 8

train_subset_size: 5000000
train_subset_stratify_on: "radiant_win"

hero:
  id_min: 1
  id_max: 150
  vocab_size: 151

# 5M-scale FT-Transformer (same skeleton as v3).
transformer_model:
  embed_dim: 256
  d_model: 256
  n_heads: 8
  n_layers: 6
  ff_mult: 4
  dropout: 0.0
  use_team_team_bias: true
  use_patch_token: true
  use_lobby_token: false
  use_canonical_sort: true
  decoder_n_layers: 2
  decoder_n_heads: 8
  remove_first_layer_first_ln: true

patch:
  vocab_size: 8
  default_patch_id: 1

pmae:
  enabled: true
  a: 0.05
  b: 0.5
  alpha_mae_start: 1.0
  alpha_mae_end: 0.1
  groups: ["player_block", "item_list", "hero_token", "patch_token"]
  min_rate: 0.05
  max_rate: 0.85
  ema_momentum: 0.996

transformer_optim:
  batch_size: 512
  lr: 1.0e-3
  weight_decay: 0.0
  max_epochs: 30
  warmup_steps: 1000
  cosine_min_lr: 1.0e-5
  num_workers: 0
  pin_memory: false
  mixed_precision: true
  patience: 5
  early_stopping_metric: val_win_log_loss

multitask_loss:
  alpha_win: 1.0
  alpha_dur: 0.15
  alpha_item: 0.3
  alpha_kda: 0.1
  alpha_gpm: 0.1
  alpha_hd: 0.1
  aux_targets:
    - kills
    - gpm
    - hero_damage

transformer_ablations:
  - name: v3_dur_ce
    use_features: true
    multitask: true
    use_patch_token: true
    use_team_team_bias: true
    use_pmae: true
    use_uw_so: false
    dur_loss_mode: ce
    use_player_embedding: false
    description: |
      A1. v3 stack with duration head reverted to 8-bucket CE.
      Single-line change vs v3; everything else identical (extended data,
      hand-tuned alpha, no UW-SO, PMAE EMA-teacher, team-team bias,
      patch token, canonical hero sort).

  - name: v3_player_emb
    use_features: true
    multitask: true
    use_patch_token: true
    use_team_team_bias: true
    use_pmae: true
    use_uw_so: false
    dur_loss_mode: regression
    use_player_embedding: true
    description: |
      A2. v3 stack + per-player identity embedding lookup (~4M params at
      128 dim, top-30k frequent + 1024 hash buckets + shared anon).
      Duration stays as regression to match v3. AdamW with no weight
      decay on the embedding.

transformer_smoke:
  max_epochs: 1
  n_train: 50000
  n_val: 5000
  metrics_suffix: "_smoke"

# Comparison anchors.
anchors:
  foundation_v3_val_auc: 0.6462
  iso_teambias_val_auc: 0.6493
  iso_pmae_val_auc: 0.6464
  embedding_prelim_val_auc: 0.6476
  cleanup_anchor_val_auc: 0.6477054
  rich_supervision_multitask_740_val_auc: 0.6495
  baseline_multitask_repro_anchor: 0.6470
  proposal_target_v3_ablations_val_auc: 0.6485

output:
  results_dir: "results"
  metrics: "metrics.json"
