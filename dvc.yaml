# DVC pipeline. Add stages as the project develops.
#
# Two evaluation stages are reserved by the HCE rule
# (~/.claude/rules/evaluation.md):
#
#   eval        — validation-split metrics. Search signal. Part of the
#                 default `dvc repro`. May read train/ and val/ only.
#   final_eval  — held-out test-split metrics. NOT part of default
#                 `dvc repro`. The only stage permitted to read test/.
#                 Run explicitly at chain end:  `dvc repro final_eval`.
#
# The placeholder below keeps `dvc repro` green on a fresh project.
# Replace it with real stages; do not collapse eval and final_eval into
# one. Do not add test/ to the deps of any stage other than final_eval.
stages:
  placeholder:
    cmd: echo "no stages yet"
    always_changed: false

  # Per-experiment DVC stages live under experiments/<slug>/. The first
  # real stages belong to the patch-7.40 plateau-baseline experiment.
  build_features_plateau_baseline_740:
    cmd: .venv/bin/python experiments/2026-05-15-plateau-baseline-740/build_features.py
    deps:
      - experiments/2026-05-15-plateau-baseline-740/build_features.py
      - splits.yaml
      - data/snapshots/7.40-2025-12-16/raw
    outs:
      - data/snapshots/7.40-2025-12-16/processed/train.parquet
      - data/snapshots/7.40-2025-12-16/processed/val.parquet
      - data/snapshots/7.40-2025-12-16/processed/build_stats.json

  train_plateau_baseline_740:
    cmd: .venv/bin/python experiments/2026-05-15-plateau-baseline-740/train.py
    deps:
      - experiments/2026-05-15-plateau-baseline-740/train.py
      - experiments/2026-05-15-plateau-baseline-740/config.yaml
      - data/snapshots/7.40-2025-12-16/processed/train.parquet
      - data/snapshots/7.40-2025-12-16/processed/val.parquet
    metrics:
      - experiments/2026-05-15-plateau-baseline-740/metrics.json:
          cache: false
    outs:
      - experiments/2026-05-15-plateau-baseline-740/results/lightgbm.txt
      - experiments/2026-05-15-plateau-baseline-740/results/calibration.png
      - experiments/2026-05-15-plateau-baseline-740/results/roc.png
      - experiments/2026-05-15-plateau-baseline-740/results/learning_curve.png
