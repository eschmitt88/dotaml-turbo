# Config for foundation-component-isolation-740.
#
# Forked from foundation-mvp-740/config.yaml. Differences:
#
# 1. Three new ablations: iso_uwso, iso_pmae, iso_teambias.
#    Each = baseline_multitask_repro flags + ONE new component.
#    (Original baseline_multitask_repro retained for smoke parity; original
#    foundation_mvp / foundation_no_patch_token retained as reference but
#    not run by default.)
# 2. PMAE `ema_momentum` added under [pmae] (bug-fix vs foundation-mvp-740).
# 3. Anchor `baseline_multitask_repro_anchor: 0.6470` added for delta fields.
#
# HCE-strict: data.py refuses to walk test-window dates [2026-03-10, 2026-03-23].

snapshot_id: "7.40-2025-12-16"
snapshot_path: "data/snapshots/7.40-2025-12-16"
splits_spec: "splits.yaml"

seed: 42

anonymous_account_ids: [0, 4294967295]

player_features_transformer:
  source_dir: "data/snapshots/7.40-2025-12-16/processed/player_features_prepatch_clean"
  feat_names:
    - "n_games_log1p"
    - "smoothed_winrate"
    - "smoothed_winrate_hero"
    - "last10_winrate"
    - "days_since_last_log1p"
    - "n_games_hero_log1p"
    - "hero_diversity_log1p"
    - "is_anonymous"
  n_player_feats: 8

# Rich-cols sidecar (reused from multitask-740; same window).
rich_cols:
  out_dir: "data/snapshots/7.40-2025-12-16/processed/rich_cols"
  train_filename: "train.parquet"
  val_filename: "val.parquet"
  smoke_train_filename: "train_smoke.parquet"
  smoke_val_filename: "val_smoke.parquet"

# Item vocab + duration buckets (reused from multitask-740 results).
item_vocab:
  vocab_path: "../2026-05-20-rich-supervision-multitask-740/results/item_vocab.json"

duration_bucket:
  n_buckets: 8

# Train subsetting -- match multitask-740 for clean A/B.
train_subset_size: 5000000
train_subset_stratify_on: "radiant_win"

hero:
  id_min: 1
  id_max: 150
  vocab_size: 151

# 5M-scale FT-Transformer (same as foundation-mvp-740).
transformer_model:
  embed_dim: 256
  d_model: 256
  n_heads: 8
  n_layers: 6
  ff_mult: 4
  dropout: 0.0
  # Foundation-specific architecture knobs (per-ablation overrides below).
  use_team_team_bias: true
  use_patch_token: true
  use_lobby_token: false
  use_canonical_sort: true
  decoder_n_layers: 2
  decoder_n_heads: 8
  remove_first_layer_first_ln: true

# Patch vocabulary.
patch:
  vocab_size: 8
  default_patch_id: 1

# UW-SO loss weighting (Kirchdorfer 2024) + per-task initial-loss normalization
# (bug-fix Bug B from foundation-mvp-740).
uw_so:
  T_init: 1.0
  learnable_T: true
  init_window_batches: 100
  # Initial alphas as a sanity fallback (used by baseline_multitask_repro only).
  fallback_alpha_win: 1.0
  fallback_alpha_dur: 0.15
  fallback_alpha_item: 0.3
  fallback_alpha_kda: 0.1
  fallback_alpha_gpm: 0.1
  fallback_alpha_hd: 0.1

# PMAE (Kim 2024) WITH EMA teacher (bug-fix Bug A from foundation-mvp-740).
pmae:
  enabled: true
  a: 0.05
  b: 0.5
  alpha_mae_start: 1.0
  alpha_mae_end: 0.1
  groups: ["player_block", "item_list", "hero_token", "patch_token"]
  min_rate: 0.05
  max_rate: 0.85
  # EMA-teacher momentum (BYOL default). High -> teacher lags more, more stable.
  ema_momentum: 0.996

transformer_optim:
  batch_size: 512
  lr: 1.0e-3
  weight_decay: 0.0
  max_epochs: 30
  warmup_steps: 1000
  cosine_min_lr: 1.0e-5
  num_workers: 0
  pin_memory: false
  mixed_precision: true
  patience: 5
  early_stopping_metric: val_win_log_loss

# Per-head loss scales (for the EW fallback inside baseline_multitask_repro).
multitask_loss:
  alpha_win: 1.0
  alpha_dur: 0.15
  alpha_item: 0.3
  alpha_kda: 0.1
  alpha_gpm: 0.1
  alpha_hd: 0.1
  aux_targets:
    - kills
    - gpm
    - hero_damage

# Each ablation adds ONE new component on top of baseline_multitask_repro.
transformer_ablations:
  - name: baseline_multitask_repro
    use_features: true
    multitask: true
    use_patch_token: false
    use_team_team_bias: false
    use_pmae: false
    use_uw_so: false
    description: "5M anchor (cleanly known to land at val_auc=0.6470 from foundation-mvp-740). Retained for smoke parity; not part of the 3-ablation isolation sweep."
  - name: iso_uwso
    use_features: true
    multitask: true
    use_patch_token: false
    use_team_team_bias: false
    use_pmae: false
    use_uw_so: true
    description: "ISOLATION ablation 1/3. Adds UW-SO loss weighting (with per-task initial-loss normalization fix) to baseline. Tests whether UW-SO alone destabilizes."
  - name: iso_pmae
    use_features: true
    multitask: true
    use_patch_token: false
    use_team_team_bias: false
    use_pmae: true
    use_uw_so: false
    description: "ISOLATION ablation 2/3. Adds PMAE auxiliary objective (with EMA-teacher bug-fix) to baseline. Tests whether PMAE alone destabilizes."
  - name: iso_teambias
    use_features: true
    multitask: true
    use_patch_token: false
    use_team_team_bias: true
    use_pmae: false
    use_uw_so: false
    description: "ISOLATION ablation 3/3. Adds (team_q, team_k) 2x2 per-head per-layer attention bias to baseline. Tests whether team bias alone destabilizes."
  - name: foundation_mvp
    use_features: true
    multitask: true
    use_patch_token: true
    use_team_team_bias: true
    use_pmae: true
    use_uw_so: true
    description: "REFERENCE only. Full design (collapsed at val_auc=0.5058 in foundation-mvp-740). Not in default sweep."
  - name: foundation_no_patch_token
    use_features: true
    multitask: true
    use_patch_token: false
    use_team_team_bias: true
    use_pmae: true
    use_uw_so: true
    description: "REFERENCE only. Not in default sweep."

transformer_smoke:
  max_epochs: 1
  n_train: 50000
  n_val: 5000
  metrics_suffix: "_smoke"

# Comparison anchors.
anchors:
  plateau_baseline_740_val_auc: 0.6161
  transformer_plus_features_extended_740_val_auc: 0.6477298
  upstream_data_cleanup_740_clean_val_auc: 0.6477054
  rich_supervision_multitask_740_val_auc: 0.6495
  proposal_target_val_auc: 0.6525
  equality_band_lower: 0.6440
  equality_band_upper: 0.6500
  cleanup_anchor_val_auc: 0.6477054
  baseline_multitask_repro_anchor: 0.6470
  scaling_helped_threshold: 0.003

output:
  results_dir: "results"
  metrics: "metrics.json"
