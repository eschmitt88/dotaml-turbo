# Config for v7-unified-masked-multitask-740.
#
# Single ablation: v7_unified.
#
# Reuses extended player_features + rich_cols sidecar parquets verbatim
# from v3/v4 (no data rebuild needed). The model adds maskable input
# projections + separate K/D/A heads + scalar duration head; data.py
# reads K/D/A/gpm/hd/dur from the existing sidecar AS INPUTS as well
# as TARGETS.

snapshot_id: "7.40-2025-12-16"
splits_spec: "splits.yaml"

seed: 42

anonymous_account_ids: [0, 4294967295]

player_features:
  source_dir: "data/snapshots/7.40-2025-12-16/processed/player_features_extended"
  feat_names:
    - "n_games_log1p"
    - "smoothed_winrate"
    - "smoothed_winrate_hero"
    - "last10_winrate"
    - "days_since_last_log1p"
    - "n_games_hero_log1p"
    - "hero_diversity_log1p"
    - "is_anonymous"
  n_player_feats: 8

rich_cols:
  out_dir: "data/snapshots/7.40-2025-12-16/processed/rich_cols_extended"

item_vocab:
  vocab_path: "../2026-05-20-rich-supervision-multitask-740/results/item_vocab.json"

train_subset_size: 5000000
train_subset_stratify_on: "radiant_win"

hero:
  id_min: 1
  id_max: 150
  vocab_size: 151

# 5M-scale FT-Transformer (same skeleton as v4).
transformer_model:
  embed_dim: 256
  d_model: 256
  n_heads: 8
  n_layers: 6
  ff_mult: 4
  dropout: 0.0
  use_team_team_bias: true
  use_canonical_sort: true
  decoder_n_layers: 2
  decoder_n_heads: 8
  remove_first_layer_first_ln: true

patch:
  vocab_size: 8
  default_patch_id: 1

transformer_optim:
  batch_size: 512
  lr: 1.0e-3
  weight_decay: 0.0
  max_epochs: 25
  warmup_steps: 1000
  cosine_min_lr: 1.0e-5
  num_workers: 0
  pin_memory: false
  mixed_precision: true
  patience: 8
  early_stopping_metric: pure_pregame_val_auc

# 9-scenario sampling distribution + per-head loss weight emphasis.
# Initial probs sum to 1.0 (re-normalized in train.py for safety).
scenarios:
  distribution:
    everything_visible:
      init_prob: 0.15
      probe_target: 0.6471                   # uses pure_pregame head; tracks well with v4
      loss_weights: {win: 2.0, dur: 1.0, items: 1.0, kills: 1.0, deaths: 1.0,
                     assists: 1.0, gpm: 1.0, hd: 1.0}
    pure_pregame:
      init_prob: 0.30
      probe_target: 0.6471
      loss_weights: {win: 2.0, dur: 1.0, items: 1.0, kills: 1.0, deaths: 1.0,
                     assists: 1.0, gpm: 1.0, hd: 1.0}
    partial_draft:
      init_prob: 0.15
      probe_target: 0.30                     # top-5 hero-rec accuracy target
      loss_weights: {win: 1.5, dur: 1.0, items: 1.0, kills: 1.0, deaths: 1.0,
                     assists: 1.0, gpm: 1.0, hd: 1.0}
    partial_items:
      init_prob: 0.10
      probe_target: 0.50                     # item BCE; lower=better, so target is upper bound
      loss_weights: {win: 1.0, dur: 1.0, items: 2.0, kills: 1.0, deaths: 1.0,
                     assists: 1.0, gpm: 1.0, hd: 1.0}
    duration_cond:
      init_prob: 0.08
      probe_target: 0.68
      loss_weights: {win: 1.5, dur: 1.0, items: 1.0, kills: 1.0, deaths: 1.0,
                     assists: 1.0, gpm: 1.0, hd: 1.0}
    items_cond:
      init_prob: 0.08
      probe_target: 0.80
      loss_weights: {win: 1.5, dur: 1.0, items: 1.0, kills: 1.0, deaths: 1.0,
                     assists: 1.0, gpm: 1.0, hd: 1.0}
    outcome_cond:
      init_prob: 0.05
      probe_target: 0.40                     # item mAP@10
      loss_weights: {win: 1.0, dur: 1.0, items: 2.0, kills: 1.0, deaths: 1.0,
                     assists: 1.0, gpm: 1.0, hd: 1.0}
    kills_pair_probe:
      init_prob: 0.05
      probe_target: 2.5                      # kills MAE upper bound
      loss_weights: {win: 1.0, dur: 1.5, items: 1.0, kills: 1.5, deaths: 1.0,
                     assists: 1.0, gpm: 1.0, hd: 1.0}
    random_uniform:
      init_prob: 0.04
      probe_target: null                     # excluded from adaptive update
      loss_weights: {win: 1.0, dur: 1.0, items: 1.0, kills: 1.0, deaths: 1.0,
                     assists: 1.0, gpm: 1.0, hd: 1.0}

probes:
  fixed_subset_size: 50000
  smoke_subset_size: 2000
  seed: 42
  batch_size: 1024
  every_epochs: 2
  halt_at_epoch: 10
  # 'direction: below' means "halt if value <= threshold"
  # 'direction: above' means "halt if value >= threshold"
  halt_thresholds:
    pure_pregame:       {value: 0.55, direction: below}
    # partial_draft HALT DISABLED 2026-05-26: probe was measuring "encoder
    # output at masked slot ~ hero embedding via cosine" but v7 has NO
    # hero-reconstruction loss — encoder outputs at masked slots are
    # adapted for predicting win/items/k/d/a/etc. not for reconstructing
    # heroes. The actual hero pick rec inference uses a candidate sweep
    # (compute win_prob for each candidate filled-in slot), not this probe.
    # Probe value still logged for transparency; halt criterion removed.
    duration_cond:      {value: 0.60, direction: below}
    items_cond:         {value: 0.70, direction: below}
    outcome_cond:       {value: 0.30, direction: below}
    # NOTE: kills/gpm/hd heads output in LOG1P space (loss is on log1p
    # targets to keep scales commensurate with win/items/dur). Halt
    # thresholds below are in log1p units. Approximate raw equivalents:
    #   kills MAE log1p ~1.5 ≈ raw kills MAE ~ 3.5 (target ~5-15)
    #   gpm MAE log1p ~0.30 ≈ raw gpm MAE ~ 130 (target ~400-700)
    #   hd MAE log1p ~0.50 ≈ raw hd MAE ~ 16000 (target ~30000)
    kills_pair_probe:   {value: 1.5,  direction: above}
    gpm_probe:          {value: 0.30, direction: above}
    hd_probe:           {value: 0.50, direction: above}
    # partial_items: no hard halt (improving signal interpreted per-trajectory)

transformer_smoke:
  max_epochs: 1
  n_train: 50000
  n_val: 5000
  metrics_suffix: "_smoke"

anchors:
  v4_val_auc: 0.6471
  iso_teambias_val_auc: 0.6493
  baseline_multitask_repro_val_auc: 0.6470
  embedding_prelim_val_auc: 0.6476
  cleanup_anchor_val_auc: 0.6477054
  proposal_pure_pregame_target: 0.6471
  proposal_items_cond_target: 0.80
  proposal_duration_cond_target: 0.68

output:
  results_dir: "results"
  metrics: "metrics.json"
