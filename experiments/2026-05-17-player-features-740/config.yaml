# Config for player-features-740. Tests information-bottleneck hypothesis
# by adding ~100 per-player leading-window features to the plateau-baseline-740
# LightGBM recipe. HCE-strict: aggregates use only matches with start_time
# strictly less than the current match's start_time. Test window never read.

snapshot_id: "7.40-2025-12-16"
snapshot_path: "data/snapshots/7.40-2025-12-16"
splits_spec: "splits.yaml"

seed: 42

# Anonymous account_ids (Steam convention).
anonymous_account_ids: [0, 4294967295]

# Player feature build
player_features:
  # Bayesian smoothing prior strength. alpha=5 means ~10-game shrinkage:
  # smoothed = (alpha + n_wins) / (2*alpha + n_games); at n=10 the weight
  # on the empirical rate is 10/(10+10) = 0.5.
  smoothing_alpha: 5.0
  # Hero-specific smoothing prior: shrinks toward per-hero base rate.
  hero_smoothing_alpha: 5.0
  # Recent-form window.
  recent_form_window: 10
  # Output parquet path (relative to project root).
  out_dir: "data/snapshots/7.40-2025-12-16/processed/player_features"
  # Per-match feature schema is fixed: 9 features × 10 players + 1 match-level
  # is_anonymous count = 91 columns + match_id key.

# Features (heroes mirror plateau-baseline-740 for sanity)
features:
  hero_id_min: 1
  hero_id_max: 150
  add_radiant_side_bit: true
  feature_dim: 391  # 300 hero one-hot + 1 side bit + 90 player feats

# Train subsetting (mirror baseline for direct A/B)
train_subset_size: 5000000
train_subset_stratify_on: "radiant_win"

# Model: identical to plateau-baseline-740 to isolate feature effect.
model:
  type: "lightgbm"
  objective: "binary"
  metric: ["binary_logloss", "auc"]
  num_boost_round: 500
  learning_rate: 0.1
  num_leaves: 31
  feature_fraction: 1.0
  bagging_fraction: 1.0
  min_data_in_leaf: 20
  reg_alpha: 0.0
  reg_lambda: 0.0
  num_threads: 16
  verbose: -1
  early_stopping_round: 0

# Smoke knobs (used by --smoke).
smoke:
  n_days: 3            # First 3 days of raw for history; then val from 2026-02-24 if reached
  max_matches: 100000  # cap training rows in smoke train
  num_boost_round: 50

# Comparison anchors (literal — for metrics.json delta fields)
anchors:
  plateau_baseline_740_val_auc: 0.6160890687449119
  plateau_baseline_740_val_acc: 0.5865996192932744
  plateau_architectures_740_val_auc: 0.6322  # best across mirrored architectures
  transformer_hp_sweep_740_val_auc: 0.6318   # best HP-sweep result
  proposal_target_val_auc: 0.6361             # baseline + 0.020
