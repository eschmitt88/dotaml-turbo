# Config for foundation-mvp-740.
#
# Forked from rich-supervision-multitask-740/config.yaml. Differences:
#
# 1. transformer_model scaled to ~5M params (d_model=256, n_layers=6, n_heads=8,
#    ff_mult=4, plus a 2-block decoder).
# 2. Adds [foundation] block: patch-token, attention bias, PMAE knobs, decoder.
# 3. Adds [uw_so] block: single temperature T.
# 4. transformer_optim: batch_size 512 (model is bigger; was 8192 in parent).
# 5. transformer_ablations now: baseline_multitask_repro, foundation_mvp,
#    foundation_no_patch_token.
# 6. Reuses the multitask-740 item vocab + sidecar paths (same window).
#
# HCE-strict: data.py refuses to walk test-window dates [2026-03-10, 2026-03-23].

snapshot_id: "7.40-2025-12-16"
snapshot_path: "data/snapshots/7.40-2025-12-16"
splits_spec: "splits.yaml"

seed: 42

anonymous_account_ids: [0, 4294967295]

player_features_transformer:
  source_dir: "data/snapshots/7.40-2025-12-16/processed/player_features_prepatch_clean"
  feat_names:
    - "n_games_log1p"
    - "smoothed_winrate"
    - "smoothed_winrate_hero"
    - "last10_winrate"
    - "days_since_last_log1p"
    - "n_games_hero_log1p"
    - "hero_diversity_log1p"
    - "is_anonymous"
  n_player_feats: 8

# Rich-cols sidecar (reused from multitask-740; same window).
rich_cols:
  out_dir: "data/snapshots/7.40-2025-12-16/processed/rich_cols"
  train_filename: "train.parquet"
  val_filename: "val.parquet"
  smoke_train_filename: "train_smoke.parquet"
  smoke_val_filename: "val_smoke.parquet"

# Item vocab + duration buckets (reused from multitask-740 results).
item_vocab:
  vocab_path: "../2026-05-20-rich-supervision-multitask-740/results/item_vocab.json"

duration_bucket:
  n_buckets: 8

# Train subsetting -- match multitask-740 for clean A/B.
train_subset_size: 5000000
train_subset_stratify_on: "radiant_win"

hero:
  id_min: 1
  id_max: 150
  vocab_size: 151

# FT-Transformer skeleton -- ~5M params end-to-end with the decoder.
# d_model=256, n_heads=8, n_layers=6, ff_mult=4 -> encoder ~ 4.7M.
# 2-block decoder ~ 1.6M. Patch+lobby+team embeddings + tokenizers add ~50K.
# Total ~ 5-6M trainable. count_params() prints actuals at startup.
transformer_model:
  embed_dim: 256
  d_model: 256
  n_heads: 8
  n_layers: 6
  ff_mult: 4
  dropout: 0.0
  # Foundation-specific architecture knobs.
  use_team_team_bias: true       # (team, team) 2x2 per-head per-layer attention bias.
  use_patch_token: true          # 1 learned patch embedding token, indexed by patch_id.
  use_lobby_token: false         # lobby_type not derivable from clean parquet on this window.
  use_canonical_sort: true       # sort each team by hero_id ascending at load time.
  decoder_n_layers: 2            # 2-block decoder over (encoder_out + task token).
  decoder_n_heads: 8
  remove_first_layer_first_ln: true   # FT-Transformer recipe (Gorishniy 2021).

# Patch vocabulary.
# Only patch 7.40 in the current training window, but the embedding table is
# pre-sized so that re-runs over a wider window don't need a schema change.
patch:
  vocab_size: 8           # space for ~8 distinct patches (7.39, 7.40, ...).
  default_patch_id: 1     # 0 = PAD, 1 = 7.40 (only one in this window).

# UW-SO loss weighting (Kirchdorfer 2024).
# omega_k = softmax(1 / sg[L_k] / T)
uw_so:
  T_init: 1.0             # single learned temperature; clamp to >= 0.1 in code.
  learnable_T: true
  # Initial alphas as a sanity fallback (used by baseline_multitask_repro only).
  fallback_alpha_win: 1.0
  fallback_alpha_dur: 0.15
  fallback_alpha_item: 0.3
  fallback_alpha_kda: 0.1
  fallback_alpha_gpm: 0.1
  fallback_alpha_hd: 0.1

# PMAE (Kim 2024). Per-column proportional mask, group-masked units.
pmae:
  enabled: true
  a: 0.05                # logit-mask slope
  b: 0.5                 # logit-mask intercept
  # Annealing alpha_mae: start at 1.0, linearly decay to 0.1 over training.
  alpha_mae_start: 1.0
  alpha_mae_end: 0.1
  # Group definitions: which semantic units to mask atomically.
  # "player_block" = a whole slot's 8 player features
  # "item_list"    = a whole slot's item multi-hot target
  # "hero_token"   = a whole hero (hero_id + per-slot feature token)
  # "patch_token"  = the single patch token
  groups: ["player_block", "item_list", "hero_token", "patch_token"]
  # Target ~ 30-50% expected mask rate. Per-column rates derived at load time
  # from p_obs (fraction of rows where the column is observed/non-anonymous).
  min_rate: 0.05
  max_rate: 0.85

transformer_optim:
  batch_size: 512
  lr: 1.0e-3
  weight_decay: 0.0
  max_epochs: 30
  warmup_steps: 1000
  cosine_min_lr: 1.0e-5
  num_workers: 0
  pin_memory: false
  mixed_precision: true
  patience: 5
  early_stopping_metric: val_win_log_loss

# Per-head loss scales (for the EW fallback inside baseline_multitask_repro).
multitask_loss:
  alpha_win: 1.0
  alpha_dur: 0.15
  alpha_item: 0.3
  alpha_kda: 0.1
  alpha_gpm: 0.1
  alpha_hd: 0.1
  aux_targets:
    - kills
    - gpm
    - hero_damage

transformer_ablations:
  - name: baseline_multitask_repro
    use_features: true
    multitask: true
    use_patch_token: false
    use_team_team_bias: false
    use_pmae: false
    use_uw_so: false              # fall back to fixed alpha weights
    description: "Replicate multitask-740 at 5M scale (no PMAE, no patch token, no team bias, fixed alpha). Anchors scaling lift."
  - name: foundation_mvp
    use_features: true
    multitask: true
    use_patch_token: true
    use_team_team_bias: true
    use_pmae: true
    use_uw_so: true
    description: "PRIMARY. Full design above. Target val_auc >= 0.6525."
  - name: foundation_no_patch_token
    use_features: true
    multitask: true
    use_patch_token: false
    use_team_team_bias: true
    use_pmae: true
    use_uw_so: true
    description: "Ablate the patch token. On the 7.40-only window this should track foundation_mvp closely (degenerate patch). Validates the token is harmless on a single-patch window."

transformer_smoke:
  max_epochs: 1
  n_train: 50000
  n_val: 5000
  metrics_suffix: "_smoke"

# Comparison anchors (literal -- for metrics.json delta fields).
anchors:
  plateau_baseline_740_val_auc: 0.6161
  transformer_plus_features_extended_740_val_auc: 0.6477298
  upstream_data_cleanup_740_clean_val_auc: 0.6477054
  rich_supervision_multitask_740_val_auc: 0.6495
  proposal_target_val_auc: 0.6525
  equality_band_lower: 0.6485
  equality_band_upper: 0.6505
  cleanup_anchor_val_auc: 0.6477054
  scaling_helped_threshold: 0.003

output:
  results_dir: "results"
  metrics: "metrics.json"
